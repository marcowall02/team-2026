<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Justizvollzug — Ausflug 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --white: #ffffff;
  --off: #F7F7F8;
  --ink: #0F0F12;
  --ink2: #3D3D44;
  --muted: #8A8A96;
  --sep: rgba(0,0,0,.08);
  --sep-w: rgba(255,255,255,.15);
  --accent: #5B21B6;
  --accent-light: rgba(91,33,182,.1);
  --accent-glow: rgba(91,33,182,.3);
  --radius: 20px;
  --shadow: 0 1px 24px rgba(0,0,0,.06), 0 0 0 1px rgba(0,0,0,.04);
  --shadow-lg: 0 8px 48px rgba(0,0,0,.14), 0 0 0 1px rgba(0,0,0,.05);
}

html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--off);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ── NAV ── */
.nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  background: rgba(10,8,16,.45);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid var(--sep-w);
}

.nav-brand {
  font-size: 14px;
  font-weight: 600;
  color: var(--white);
  letter-spacing: -.2px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.nav-badge {
  font-size: 10px;
  font-weight: 500;
  background: rgba(255,255,255,.15);
  color: rgba(255,255,255,.7);
  border-radius: 20px;
  padding: 2px 9px;
  letter-spacing: .2px;
}

.nav-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.nav-count {
  font-size: 12px;
  color: rgba(255,255,255,.5);
  font-weight: 400;
}

.nav-add {
  font-size: 13px;
  font-weight: 500;
  color: var(--white);
  background: var(--accent);
  border: none;
  border-radius: 20px;
  padding: 7px 16px;
  cursor: pointer;
  font-family: inherit;
  transition: opacity .15s, transform .1s;
  letter-spacing: -.1px;
}
.nav-add:hover { opacity: .88; }
.nav-add:active { transform: scale(.97); }

/* ── HERO ── */
.hero {
  position: relative;
  min-height: 92vh;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 80px 48px 72px;
  overflow: hidden;
}

.hero-bg {
  position: absolute;
  inset: 0;
  background-image: url('https://images.unsplash.com/photo-1501854140801-50d01698950b?w=1920&q=85&auto=format&fit=crop');
  background-size: cover;
  background-position: center 40%;
  transform: scale(1.04);
  transition: transform 8s ease;
}

.hero-bg::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(5,4,10,.2) 0%,
    rgba(5,4,10,.1) 30%,
    rgba(5,4,10,.55) 70%,
    rgba(5,4,10,.92) 100%
  );
}

.hero-content {
  position: relative;
  z-index: 2;
  max-width: 760px;
  opacity: 0;
  animation: fadeUp .8s .2s forwards;
}

.hero-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: rgba(255,255,255,.6);
  margin-bottom: 20px;
}

.hero-eyebrow .pulse {
  width: 6px; height: 6px;
  background: #a78bfa;
  border-radius: 50%;
  animation: pulse 2s infinite;
}

.hero-title {
  font-family: 'Instrument Serif', Georgia, serif;
  font-size: clamp(48px, 7vw, 86px);
  line-height: 1.0;
  color: var(--white);
  font-weight: 400;
  letter-spacing: -.5px;
  margin-bottom: 20px;
}

.hero-title em {
  font-style: italic;
  color: #c4b5fd;
}

.hero-sub {
  font-size: 16px;
  color: rgba(255,255,255,.6);
  line-height: 1.7;
  max-width: 440px;
  font-weight: 300;
  letter-spacing: -.1px;
}

.hero-scroll {
  position: absolute;
  bottom: 32px;
  right: 48px;
  z-index: 2;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: rgba(255,255,255,.35);
  letter-spacing: .1em;
  text-transform: uppercase;
  font-weight: 500;
  animation: fadeIn .6s .8s both;
}

.scroll-line {
  width: 32px;
  height: 1px;
  background: rgba(255,255,255,.25);
}

/* ── MAIN SECTION ── */
.main {
  background: var(--off);
  position: relative;
  z-index: 2;
}

.section-head {
  padding: 64px 48px 32px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
  opacity: 0;
  animation: fadeUp .5s .1s forwards;
}

.section-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 8px;
}

.section-title {
  font-family: 'Instrument Serif', Georgia, serif;
  font-size: 32px;
  font-weight: 400;
  letter-spacing: -.3px;
  color: var(--ink);
  line-height: 1.2;
}

.section-meta {
  font-size: 13px;
  color: var(--muted);
  font-weight: 400;
  white-space: nowrap;
}

/* ── GRID ── */
.grid-wrap {
  padding: 0 48px 40px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}

/* ── CARD ── */
.card {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 28px;
  display: flex;
  flex-direction: column;
  cursor: default;
  transition: box-shadow .3s, transform .3s;
  opacity: 0;
  animation: fadeUp .5s forwards;
  border: 1px solid rgba(0,0,0,.04);
}

.card:hover {
  box-shadow: var(--shadow-lg);
  transform: translateY(-3px);
}

.card:nth-child(1) { animation-delay: .1s; }
.card:nth-child(2) { animation-delay: .16s; }
.card:nth-child(3) { animation-delay: .22s; }
.card:nth-child(4) { animation-delay: .28s; }
.card:nth-child(5) { animation-delay: .34s; }
.card:nth-child(n+6) { animation-delay: .4s; }

.card-emoji {
  font-size: 32px;
  line-height: 1;
  margin-bottom: 20px;
  display: block;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,.12));
}

.card-tag {
  display: inline-flex;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .3px;
  text-transform: uppercase;
  color: var(--accent);
  background: var(--accent-light);
  padding: 3px 10px;
  border-radius: 20px;
  margin-bottom: 12px;
  width: fit-content;
}

.card-title {
  font-family: 'Instrument Serif', Georgia, serif;
  font-size: 20px;
  font-weight: 400;
  letter-spacing: -.1px;
  line-height: 1.25;
  margin-bottom: 5px;
  color: var(--ink);
}

.card-location {
  font-size: 12px;
  color: var(--muted);
  font-weight: 400;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 4px;
}

.card-body {
  font-size: 13.5px;
  color: var(--ink2);
  line-height: 1.7;
  letter-spacing: -.05px;
  flex: 1;
  font-weight: 300;
}

.card-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 16px;
}

.pill {
  font-size: 11px;
  color: var(--muted);
  background: var(--off);
  border-radius: 20px;
  padding: 3px 10px;
  font-weight: 500;
  letter-spacing: -.05px;
}

.card-foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 18px;
  padding-top: 16px;
  border-top: 1px solid var(--sep);
}

.like-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: none;
  border: 1px solid var(--sep);
  border-radius: 20px;
  padding: 5px 14px 5px 10px;
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  color: var(--muted);
  font-weight: 500;
  transition: all .2s;
  letter-spacing: -.05px;
}

.like-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-light);
}

.like-btn.liked {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-light);
}

.like-btn .h { font-size: 14px; display: inline-block; transition: transform .15s; }
.like-btn.liked .h { transform: scale(1.2); }

@keyframes pop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.5); }
  70%  { transform: scale(.88); }
  100% { transform: scale(1); }
}
.h.pop { animation: pop .28s ease; }

/* ── ADD SECTION ── */
.add-wrap {
  padding: 0 48px 64px;
  opacity: 0;
  animation: fadeUp .4s .45s forwards;
}

.add-btn {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 14px;
  background: var(--white);
  border: 1.5px dashed rgba(91,33,182,.25);
  border-radius: var(--radius);
  padding: 22px 28px;
  cursor: pointer;
  font-family: inherit;
  font-size: 15px;
  color: var(--muted);
  font-weight: 500;
  letter-spacing: -.1px;
  transition: border-color .2s, color .2s, background .2s, box-shadow .2s;
  box-shadow: var(--shadow);
}

.add-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(91,33,182,.03);
  box-shadow: 0 4px 24px var(--accent-glow);
}

.add-icon {
  width: 32px; height: 32px;
  background: var(--accent-light);
  color: var(--accent);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 300;
  flex-shrink: 0;
  transition: background .2s, transform .2s;
}

.add-btn:hover .add-icon {
  background: rgba(91,33,182,.18);
  transform: rotate(90deg);
}

/* ── FOOTER ── */
footer {
  padding: 24px 48px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-top: 1px solid var(--sep);
}

.fn { font-size: 12px; color: var(--muted); }

.fn-logo {
  font-family: 'Instrument Serif', Georgia, serif;
  font-size: 14px;
  color: var(--muted);
  font-style: italic;
}

/* ── MODAL / SHEET ── */
.backdrop {
  position: fixed;
  inset: 0;
  background: rgba(5,4,10,.6);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  z-index: 200;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s;
}

@media (min-width: 640px) {
  .backdrop { align-items: center; padding: 24px; }
}

.backdrop.open { opacity: 1; pointer-events: all; }

.sheet {
  background: var(--white);
  width: 100%;
  max-width: 540px;
  border-radius: var(--radius) var(--radius) 0 0;
  padding: 24px 24px 40px;
  transform: translateY(32px);
  transition: transform .3s cubic-bezier(.32,1.1,.7,1);
  max-height: 92vh;
  overflow-y: auto;
}

@media (min-width: 640px) {
  .sheet { border-radius: var(--radius); padding: 36px; transform: translateY(20px) scale(.96); }
}

.backdrop.open .sheet { transform: translateY(0) scale(1); }

.sheet-handle {
  width: 36px; height: 4px;
  background: var(--sep);
  border-radius: 2px;
  margin: 0 auto 24px;
  display: block;
}
@media (min-width: 640px) { .sheet-handle { display: none; } }

.sheet-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 28px;
}

.sheet-title {
  font-family: 'Instrument Serif', Georgia, serif;
  font-size: 26px;
  font-weight: 400;
  letter-spacing: -.2px;
  line-height: 1.1;
}

.sheet-title em { font-style: italic; color: var(--accent); }

.sheet-close {
  width: 32px; height: 32px;
  background: var(--off);
  border: none;
  border-radius: 50%;
  cursor: pointer;
  font-size: 14px;
  color: var(--muted);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  transition: background .15s;
  flex-shrink: 0;
}
.sheet-close:hover { background: var(--sep); }

.fg { margin-bottom: 18px; }

.fg label {
  display: block;
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: .3px;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.fg input, .fg textarea {
  width: 100%;
  background: var(--off);
  border: 1.5px solid transparent;
  border-radius: 12px;
  padding: 11px 14px;
  font-family: inherit;
  font-size: 15px;
  color: var(--ink);
  font-weight: 400;
  outline: none;
  transition: border-color .15s, background .15s;
  letter-spacing: -.1px;
}

.fg input:focus, .fg textarea:focus {
  border-color: var(--accent);
  background: var(--white);
}

.fg textarea { resize: none; height: 88px; line-height: 1.65; }

.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.icon-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
.ir { display: none; }
.il {
  width: 44px; height: 44px;
  background: var(--off);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  cursor: pointer;
  transition: background .15s, transform .1s;
  border: 2px solid transparent;
}
.ir:checked + .il {
  background: var(--accent-light);
  border-color: var(--accent);
  transform: scale(1.1);
}

.vrow { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
.vc { display: none; }
.vl {
  font-size: 13px;
  color: var(--muted);
  background: var(--off);
  border-radius: 20px;
  padding: 5px 13px;
  cursor: pointer;
  transition: all .15s;
  font-weight: 500;
  border: 1.5px solid transparent;
}
.vc:checked + .vl {
  background: var(--accent-light);
  color: var(--accent);
  border-color: rgba(91,33,182,.2);
}

.submit {
  width: 100%;
  padding: 15px;
  background: var(--ink);
  color: var(--white);
  border: none;
  border-radius: 12px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -.1px;
  cursor: pointer;
  margin-top: 4px;
  transition: opacity .15s, transform .1s;
}
.submit:hover { opacity: .85; }
.submit:active { transform: scale(.99); }

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: .4; transform: scale(.8); }
}

/* ── RESPONSIVE ── */
@media (max-width: 860px) {
  .hero { padding: 80px 28px 56px; }
  .section-head { padding: 48px 28px 24px; }
  .grid-wrap { padding: 0 28px 32px; }
  .add-wrap { padding: 0 28px 48px; }
  footer { padding: 20px 28px 36px; }
  .nav { padding: 0 20px; }
  .grid { grid-template-columns: 1fr 1fr; }
}

@media (max-width: 560px) {
  .hero { padding: 80px 20px 48px; min-height: 80vh; }
  .section-head { flex-direction: column; align-items: flex-start; padding: 40px 20px 20px; }
  .grid-wrap { padding: 0 20px 28px; }
  .add-wrap { padding: 0 20px 40px; }
  footer { padding: 20px 20px 32px; }
  .grid { grid-template-columns: 1fr; }
  .hero-scroll { display: none; }
  .two-col { grid-template-columns: 1fr; }
  .nav-badge { display: none; }
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-brand">
    Team Justizvollzug
    <span class="nav-badge">Ausflug 2026</span>
  </div>
  <div class="nav-right">
    <span class="nav-count" id="nav-count"></span>
    <button class="nav-add" onclick="openSheet()">+ Idee</button>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-content">
    <div class="hero-eyebrow"><span class="pulse"></span>Teamausflug 2026</div>
    <h1 class="hero-title">Raus aus dem<br><em>Büro.</em></h1>
    <p class="hero-sub">Kein Workshopformat, kein Agenda-PDF. Einfach mal was erleben, das hängen bleibt — stimmt ab, was euch begeistert.</p>
  </div>
  <div class="hero-scroll">
    <span class="scroll-line"></span>
    Ideen entdecken
  </div>
</section>

<!-- MAIN -->
<div class="main">

  <div class="section-head">
    <div>
      <div class="section-label">Vorschläge</div>
      <div class="section-title">Was wollt ihr machen?</div>
    </div>
    <span class="section-meta" id="section-count"></span>
  </div>

  <div class="grid-wrap">
    <div class="grid" id="grid"></div>
  </div>

  <div class="add-wrap">
    <button class="add-btn" onclick="openSheet()">
      <span class="add-icon">+</span>
      Eigene Idee vorschlagen
    </button>
  </div>

  <footer>
    <span class="fn-logo">Team Justizvollzug</span>
    <span class="fn">Kein Budget-Sheet. Einfach buchen.</span>
  </footer>

</div>

<!-- SHEET MODAL -->
<div class="backdrop" id="backdrop" onclick="onBackdrop(event)">
  <div class="sheet">
    <span class="sheet-handle"></span>
    <div class="sheet-head">
      <div class="sheet-title">Neue<br><em>Idee</em></div>
      <button class="sheet-close" onclick="closeSheet()">✕</button>
    </div>
    <form id="form" onsubmit="onSubmit(event)">
      <div class="two-col">
        <div class="fg">
          <label>Titel</label>
          <input id="f-title" type="text" placeholder="Surfkurs Nordsee" required maxlength="60">
        </div>
        <div class="fg">
          <label>Ort</label>
          <input id="f-loc" type="text" placeholder="Westerland, Sylt" required maxlength="60">
        </div>
      </div>
      <div class="fg">
        <label>Kategorie</label>
        <input id="f-tag" type="text" placeholder="Kulinarik · Adrenalin · Natur …" required maxlength="30">
      </div>
      <div class="fg">
        <label>Beschreibung</label>
        <textarea id="f-body" placeholder="Was macht es besonders?" required maxlength="500"></textarea>
      </div>
      <div class="fg">
        <label>Icon</label>
        <div class="icon-row">
          <input class="ir" type="radio" name="icon" id="i1" value="🌊" checked><label class="il" for="i1">🌊</label>
          <input class="ir" type="radio" name="icon" id="i2" value="🍷"><label class="il" for="i2">🍷</label>
          <input class="ir" type="radio" name="icon" id="i3" value="🏎"><label class="il" for="i3">🏎</label>
          <input class="ir" type="radio" name="icon" id="i4" value="🛶"><label class="il" for="i4">🛶</label>
          <input class="ir" type="radio" name="icon" id="i5" value="⛰"><label class="il" for="i5">⛰</label>
          <input class="ir" type="radio" name="icon" id="i6" value="🎿"><label class="il" for="i6">🎿</label>
          <input class="ir" type="radio" name="icon" id="i7" value="🏄"><label class="il" for="i7">🏄</label>
          <input class="ir" type="radio" name="icon" id="i8" value="🍕"><label class="il" for="i8">🍕</label>
          <input class="ir" type="radio" name="icon" id="i9" value="🎸"><label class="il" for="i9">🎸</label>
          <input class="ir" type="radio" name="icon" id="i10" value="🧗"><label class="il" for="i10">🧗</label>
          <input class="ir" type="radio" name="icon" id="i11" value="🎯"><label class="il" for="i11">🎯</label>
          <input class="ir" type="radio" name="icon" id="i12" value="🌿"><label class="il" for="i12">🌿</label>
        </div>
      </div>
      <div class="fg">
        <label>Vibes</label>
        <div class="vrow">
          <input class="vc" type="checkbox" id="v1" value="Freiluft"><label class="vl" for="v1">Freiluft</label>
          <input class="vc" type="checkbox" id="v2" value="1 Tag"><label class="vl" for="v2">1 Tag</label>
          <input class="vc" type="checkbox" id="v3" value="2 Tage"><label class="vl" for="v3">2 Tage</label>
          <input class="vc" type="checkbox" id="v4" value="Ganzjährig"><label class="vl" for="v4">Ganzjährig</label>
          <input class="vc" type="checkbox" id="v5" value="Sommer"><label class="vl" for="v5">Sommer</label>
          <input class="vc" type="checkbox" id="v6" value="Frühling"><label class="vl" for="v6">Frühling</label>
          <input class="vc" type="checkbox" id="v7" value="Herbst"><label class="vl" for="v7">Herbst</label>
          <input class="vc" type="checkbox" id="v8" value="Adrenalin"><label class="vl" for="v8">Adrenalin</label>
          <input class="vc" type="checkbox" id="v9" value="Entspannt"><label class="vl" for="v9">Entspannt</label>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, push, set, runTransaction } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyDJ9-KjHYuYJSxDp0Jw2OrSB_SmUmG7CsE",
  authDomain: "team-2026-a2f23.firebaseapp.com",
  projectId: "team-2026-a2f23",
  storageBucket: "team-2026-a2f23.firebasestorage.app",
  messagingSenderId: "96362063074",
  appId: "1:96362063074:web:19a11429256196ec156abb",
  databaseURL: "https://team-2026-a2f23-default-rtdb.europe-west1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

const DEFAULTS = [
  { id:'d1', icon:'🌊', tag:'Natur & Meer', title:'Wattwanderung auf Sylt', loc:'Sylt, Schleswig-Holstein', body:'Mit einem lokalen Wattführer durch das Weltnaturerbe — barfuß durch Schlamm, Wind im Gesicht, kein Laptop in Sicht. Danach Austern und Weißwein in einem der Strandbistros. Sylt ist teuer, aber für 4 Leute mit einem guten 4-Sterne-Hotel vollkommen im Rahmen. Und der Kontrast zur Bürowoche ist maximal.', vibes:['Freiluft','Nordsee-Feeling','Frühling / Sommer'] },
  { id:'d2', icon:'🍷', tag:'Kulinarik', title:'Weingut-Tag in der Pfalz', loc:'Deutsche Weinstraße, Rheinland-Pfalz', body:'Ein gutes Weingut bucht für kleine Gruppen Privatführungen mit Kellermeister — Barrelverkostung, 5 Weine, Fragen stellen die man bei einer normalen Tour nie stellen kann. Danach Abendessen in Neustadt oder Deidesheim.', vibes:['1 Tag','Ganzjährig'] },
  { id:'d3', icon:'🏎', tag:'Adrenalin', title:'Racetrack Day am Nürburgring', loc:'Nürburg, Eifel', body:'Sportwagen mieten, mit Instructor über die Nordschleife. Jeder fährt, danach Rundenzeiten vergleichen. Für vier competitive Leute vermutlich die beste Entscheidung seit dem letzten Jahresgespräch.', vibes:['1 Tag','März – Nov'] },
  { id:'d4', icon:'🛶', tag:'Slow Travel', title:'Hausboot-Wochenende Mecklenburg', loc:'Mecklenburgische Seenplatte', body:'Ein Hausboot für 4 Personen, kein Führerschein nötig. Zwei Tage durch Seen und Kanäle schippern, grillen an Bord, abends irgendwo anlegen. Komplett loslassen, kein Hotel, kein Programm.', vibes:['2 Tage','Mai – Sep'] },
  { id:'d5', icon:'⛰', tag:'Outdoor', title:'Biken & Hütte im Allgäu', loc:'Allgäu / Kleinwalsertal', body:'E-Bikes oder klassisch — Tagesroute mit ordentlich Höhenmetern, Mittagsstopp auf einer Alm. Abends Übernachtung in einer gut ausgestatteten Berghütte mit Halbpension.', vibes:['1–2 Tage','Sommer / Herbst'] },
];

const myLikes = new Set(JSON.parse(localStorage.getItem('t26-my') || '[]'));
const saveMyLikes = () => localStorage.setItem('t26-my', JSON.stringify([...myLikes]));

let trips = [];
let likeCounts = {};

function render() {
  const g = document.getElementById('grid');
  g.innerHTML = '';
  trips.forEach((t, i) => {
    const n     = likeCounts[t.id] || 0;
    const liked = myLikes.has(t.id);
    const c = document.createElement('div');
    c.className = 'card';
    c.style.animationDelay = (.08 + i * .06) + 's';
    c.innerHTML = `
      <span class="card-emoji">${t.icon}</span>
      <span class="card-tag">${t.tag}</span>
      <div class="card-title">${t.title}</div>
      <div class="card-location">↗ ${t.loc}</div>
      <div class="card-body">${t.body}</div>
      <div class="card-pills">${(t.vibes||[]).map(v=>`<span class="pill">${v}</span>`).join('')}</div>
      <div class="card-foot">
        <button class="like-btn ${liked?'liked':''}" data-id="${t.id}">
          <span class="h">${liked?'♥':'♡'}</span>
          <span>${n > 0 ? n + ' ' : ''}${liked ? 'Gefällt mir' : 'Gefällt mir'}</span>
        </button>
      </div>`;
    c.querySelector('.like-btn').addEventListener('click', () => toggleLike(t.id));
    g.appendChild(c);
  });
  const label = trips.length + ' Vorschlag' + (trips.length !== 1 ? 'e' : '');
  document.getElementById('nav-count').textContent = label;
  document.getElementById('section-count').textContent = label;
}

function toggleLike(id) {
  const liked = myLikes.has(id);
  liked ? myLikes.delete(id) : myLikes.add(id);
  saveMyLikes();
  runTransaction(ref(db, 'likes/' + id), val => (val || 0) + (liked ? -1 : 1));
}

window.openSheet  = () => { document.getElementById('backdrop').classList.add('open'); document.body.style.overflow = 'hidden'; };
window.closeSheet = () => { document.getElementById('backdrop').classList.remove('open'); document.body.style.overflow = ''; };
window.onBackdrop = e  => { if (e.target === document.getElementById('backdrop')) closeSheet(); };
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSheet(); });

window.onSubmit = e => {
  e.preventDefault();
  push(ref(db, 'trips'), {
    icon:      document.querySelector('.ir:checked')?.value || '✈️',
    tag:       document.getElementById('f-tag').value.trim(),
    title:     document.getElementById('f-title').value.trim(),
    loc:       document.getElementById('f-loc').value.trim(),
    body:      document.getElementById('f-body').value.trim(),
    vibes:     [...document.querySelectorAll('.vc:checked')].map(x => x.value),
    createdAt: Date.now(),
  });
  closeSheet();
  e.target.reset();
};

onValue(ref(db, 'trips'), snap => {
  if (!snap.exists()) {
    DEFAULTS.forEach(d => set(ref(db, 'trips/' + d.id), { icon:d.icon, tag:d.tag, title:d.title, loc:d.loc, body:d.body, vibes:d.vibes, createdAt:0 }));
    return;
  }
  trips = Object.entries(snap.val())
    .map(([id, v]) => ({ id, ...v }))
    .sort((a, b) => a.createdAt - b.createdAt);
  render();
});

onValue(ref(db, 'likes'), snap => {
  likeCounts = snap.exists() ? snap.val() : {};
  render();
});

// subtle parallax on hero bg
window.addEventListener('scroll', () => {
  const el = document.querySelector('.hero-bg');
  if (el) el.style.transform = `scale(1.04) translateY(${window.scrollY * 0.2}px)`;
});
</script>
</body>
</html>
