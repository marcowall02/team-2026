<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Trip 2026</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F2F2F7;
    --surface: #FFFFFF;
    --surface2: #F9F9FB;
    --ink: #1C1C1E;
    --ink2: #3A3A3C;
    --muted: #8E8E93;
    --sep: rgba(60,60,67,.12);
    --accent: #FF3B30;
    --accent-blue: #007AFF;
    --radius: 18px;
    --radius-sm: 12px;
    --shadow: 0 2px 20px rgba(0,0,0,.07), 0 0 0 0.5px rgba(0,0,0,.06);
    --shadow-hover: 0 8px 40px rgba(0,0,0,.13), 0 0 0 0.5px rgba(0,0,0,.06);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .nav {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(242,242,247,.82);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 0.5px solid var(--sep);
    padding: 0 28px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    opacity: 0;
    animation: fadeIn .4s .05s forwards;
  }

  .nav-brand {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -.3px;
    color: var(--ink);
  }

  .nav-meta {
    font-size: 13px;
    color: var(--muted);
    font-weight: 400;
  }

  /* ── HERO ── */
  .hero {
    padding: 64px 28px 48px;
    max-width: 960px;
    margin: 0 auto;
    opacity: 0;
    animation: fadeUp .5s .15s forwards;
  }

  .hero-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 500;
    color: var(--accent-blue);
    margin-bottom: 16px;
    letter-spacing: -.1px;
  }

  .hero-label .dot {
    width: 7px;
    height: 7px;
    background: var(--accent-blue);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: .5; transform: scale(.85); }
  }

  .hero-title {
    font-size: clamp(40px, 6vw, 72px);
    font-weight: 700;
    letter-spacing: -1.5px;
    line-height: 1.05;
    color: var(--ink);
    margin-bottom: 16px;
  }

  .hero-title span {
    color: var(--muted);
    font-weight: 300;
  }

  .hero-sub {
    font-size: 17px;
    color: var(--muted);
    line-height: 1.6;
    max-width: 460px;
    font-weight: 400;
    letter-spacing: -.1px;
  }

  /* ── GRID ── */
  .grid-wrap {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 28px 32px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 24px;
    display: flex;
    flex-direction: column;
    cursor: default;
    transition: box-shadow .25s, transform .25s;
    opacity: 0;
    animation: fadeUp .45s forwards;
  }

  .card:hover {
    box-shadow: var(--shadow-hover);
    transform: translateY(-2px);
  }

  .card:nth-child(1) { animation-delay: .2s; }
  .card:nth-child(2) { animation-delay: .27s; }
  .card:nth-child(3) { animation-delay: .34s; }
  .card:nth-child(4) { animation-delay: .41s; }
  .card:nth-child(5) { animation-delay: .48s; }
  .card:nth-child(n+6) { animation-delay: .54s; }

  .card-emoji {
    font-size: 36px;
    line-height: 1;
    margin-bottom: 16px;
    display: block;
  }

  .card-tag {
    display: inline-flex;
    align-items: center;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .4px;
    text-transform: uppercase;
    color: var(--accent-blue);
    background: rgba(0,122,255,.08);
    padding: 3px 9px;
    border-radius: 20px;
    margin-bottom: 10px;
    width: fit-content;
  }

  .card-title {
    font-size: 19px;
    font-weight: 700;
    letter-spacing: -.3px;
    line-height: 1.25;
    margin-bottom: 4px;
    color: var(--ink);
  }

  .card-location {
    font-size: 12px;
    color: var(--muted);
    font-weight: 400;
    letter-spacing: -.1px;
    margin-bottom: 12px;
  }

  .card-body {
    font-size: 14px;
    color: var(--ink2);
    line-height: 1.65;
    letter-spacing: -.1px;
    flex: 1;
  }

  .card-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 14px;
  }

  .pill {
    font-size: 11px;
    color: var(--muted);
    background: var(--bg);
    border-radius: 20px;
    padding: 3px 10px;
    font-weight: 500;
    letter-spacing: -.1px;
  }

  /* ── LIKE ── */
  .card-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 16px;
    padding-top: 14px;
    border-top: 0.5px solid var(--sep);
  }

  .like-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    color: var(--muted);
    font-weight: 500;
    padding: 4px 8px;
    border-radius: 8px;
    transition: background .15s, color .15s;
    letter-spacing: -.1px;
  }

  .like-btn:hover { background: var(--bg); }

  .like-btn.liked { color: var(--accent); }

  .like-btn .h {
    font-size: 15px;
    transition: transform .15s;
    display: inline-block;
  }

  .like-btn.liked .h { transform: scale(1.15); }

  @keyframes pop {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.4); }
    70%  { transform: scale(.88); }
    100% { transform: scale(1); }
  }

  .h.pop { animation: pop .28s ease; }

  /* ── ADD BUTTON ── */
  .add-wrap {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 28px 80px;
    opacity: 0;
    animation: fadeUp .4s .55s forwards;
  }

  .add-btn {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 1.5px dashed var(--sep);
    border-radius: var(--radius);
    padding: 20px 24px;
    cursor: pointer;
    font-family: inherit;
    font-size: 15px;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: -.1px;
    transition: border-color .2s, color .2s, background .2s;
    box-shadow: var(--shadow);
  }

  .add-btn:hover {
    border-color: var(--accent-blue);
    color: var(--accent-blue);
    background: rgba(0,122,255,.03);
  }

  .add-icon {
    width: 30px;
    height: 30px;
    background: var(--bg);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 300;
    flex-shrink: 0;
    transition: background .2s;
    color: var(--muted);
  }

  .add-btn:hover .add-icon {
    background: rgba(0,122,255,.1);
    color: var(--accent-blue);
  }

  /* ── MODAL ── */
  .backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.4);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding: 0;
    opacity: 0;
    pointer-events: none;
    transition: opacity .22s;
  }

  @media (min-width: 600px) {
    .backdrop { align-items: center; padding: 20px; }
  }

  .backdrop.open { opacity: 1; pointer-events: all; }

  .sheet {
    background: var(--surface);
    width: 100%;
    max-width: 520px;
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 28px 24px 40px;
    transform: translateY(30px);
    transition: transform .28s cubic-bezier(.32,1.15,.7,1);
    max-height: 92vh;
    overflow-y: auto;
  }

  @media (min-width: 600px) {
    .sheet {
      border-radius: var(--radius);
      padding: 32px;
      transform: translateY(20px) scale(.97);
    }
  }

  .backdrop.open .sheet { transform: translateY(0) scale(1); }

  .sheet-handle {
    width: 36px;
    height: 4px;
    background: var(--sep);
    border-radius: 2px;
    margin: 0 auto 24px;
    display: block;
  }

  @media (min-width: 600px) { .sheet-handle { display: none; } }

  .sheet-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 28px;
  }

  .sheet-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -.5px;
  }

  .sheet-close {
    width: 30px;
    height: 30px;
    background: var(--bg);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    font-size: 14px;
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .15s;
    font-weight: 600;
  }

  .sheet-close:hover { background: var(--sep); }

  .fg { margin-bottom: 18px; }

  .fg label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: -.1px;
    margin-bottom: 6px;
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: .3px;
  }

  .fg input, .fg textarea, .fg select {
    width: 100%;
    background: var(--bg);
    border: 1.5px solid transparent;
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-family: inherit;
    font-size: 15px;
    color: var(--ink);
    font-weight: 400;
    outline: none;
    transition: border-color .15s;
    letter-spacing: -.1px;
    -webkit-appearance: none;
  }

  .fg input:focus, .fg textarea:focus {
    border-color: var(--accent-blue);
    background: var(--surface);
  }

  .fg textarea { resize: none; height: 88px; line-height: 1.6; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* icon picker */
  .icon-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 4px;
  }

  .ir { display: none; }

  .il {
    width: 44px;
    height: 44px;
    background: var(--bg);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    cursor: pointer;
    transition: background .15s, transform .1s;
    border: 2px solid transparent;
  }

  .ir:checked + .il {
    background: rgba(0,122,255,.1);
    border-color: var(--accent-blue);
    transform: scale(1.08);
  }

  /* vibe pills */
  .vrow { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .vc { display: none; }
  .vl {
    font-size: 13px;
    color: var(--muted);
    background: var(--bg);
    border-radius: 20px;
    padding: 5px 13px;
    cursor: pointer;
    transition: background .15s, color .15s;
    font-weight: 500;
    border: 1.5px solid transparent;
    letter-spacing: -.1px;
  }
  .vc:checked + .vl {
    background: rgba(0,122,255,.1);
    color: var(--accent-blue);
    border-color: rgba(0,122,255,.2);
  }

  .submit {
    width: 100%;
    padding: 15px;
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -.2px;
    cursor: pointer;
    margin-top: 4px;
    transition: opacity .15s, transform .1s;
  }

  .submit:hover { opacity: .88; }
  .submit:active { transform: scale(.99); }

  /* ── FOOTER ── */
  footer {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 28px 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 0.5px solid var(--sep);
    padding-top: 20px;
  }

  .fn {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: -.1px;
  }

  /* ── ANIMS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 760px) {
    .grid { grid-template-columns: 1fr 1fr; gap: 12px; }
  }

  @media (max-width: 520px) {
    .grid { grid-template-columns: 1fr; gap: 12px; }
    .hero { padding: 40px 20px 32px; }
    .grid-wrap, .add-wrap { padding-left: 20px; padding-right: 20px; }
    .two-col { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<nav class="nav">
  <span class="nav-brand">Team Trip 2026</span>
  <span class="nav-meta" id="nav-count">5 Ideen</span>
</nav>

<section class="hero">
  <div class="hero-label"><span class="dot"></span> Ausflug Ideen</div>
  <h1 class="hero-title">Raus aus dem<br><span>Büro.</span></h1>
  <p class="hero-sub">Kein Workshopformat, kein Agenda-PDF. Einfach mal was erleben, das hängen bleibt.</p>
</section>

<div class="grid-wrap">
  <div class="grid" id="grid"></div>
</div>

<div class="add-wrap">
  <button class="add-btn" onclick="openSheet()">
    <span class="add-icon">+</span>
    Eigene Idee hinzufügen
  </button>
</div>

<footer>
  <span class="fn">Kein Budget-Sheet. Einfach buchen.</span>
  <span class="fn" style="color:var(--accent)">●</span>
</footer>

<!-- SHEET -->
<div class="backdrop" id="backdrop" onclick="onBackdrop(event)">
  <div class="sheet">
    <span class="sheet-handle"></span>
    <div class="sheet-head">
      <span class="sheet-title">Neue Idee</span>
      <button class="sheet-close" onclick="closeSheet()">✕</button>
    </div>
    <form id="form" onsubmit="onSubmit(event)">

      <div class="two-col">
        <div class="fg">
          <label>Titel</label>
          <input id="f-title" type="text" placeholder="Surfkurs Nordsee" required maxlength="60">
        </div>
        <div class="fg">
          <label>Ort</label>
          <input id="f-loc" type="text" placeholder="Westerland, Sylt" required maxlength="60">
        </div>
      </div>

      <div class="fg">
        <label>Kategorie</label>
        <input id="f-tag" type="text" placeholder="z.B. Kulinarik · Adrenalin · Natur" required maxlength="30">
      </div>

      <div class="fg">
        <label>Beschreibung</label>
        <textarea id="f-body" placeholder="Was macht es besonders?" required maxlength="500"></textarea>
      </div>

      <div class="fg">
        <label>Icon</label>
        <div class="icon-row">
          <input class="ir" type="radio" name="icon" id="i1" value="🌊" checked><label class="il" for="i1">🌊</label>
          <input class="ir" type="radio" name="icon" id="i2" value="🍷"><label class="il" for="i2">🍷</label>
          <input class="ir" type="radio" name="icon" id="i3" value="🏎"><label class="il" for="i3">🏎</label>
          <input class="ir" type="radio" name="icon" id="i4" value="🛶"><label class="il" for="i4">🛶</label>
          <input class="ir" type="radio" name="icon" id="i5" value="⛰"><label class="il" for="i5">⛰</label>
          <input class="ir" type="radio" name="icon" id="i6" value="🎿"><label class="il" for="i6">🎿</label>
          <input class="ir" type="radio" name="icon" id="i7" value="🏄"><label class="il" for="i7">🏄</label>
          <input class="ir" type="radio" name="icon" id="i8" value="🍕"><label class="il" for="i8">🍕</label>
          <input class="ir" type="radio" name="icon" id="i9" value="🎸"><label class="il" for="i9">🎸</label>
          <input class="ir" type="radio" name="icon" id="i10" value="🧗"><label class="il" for="i10">🧗</label>
          <input class="ir" type="radio" name="icon" id="i11" value="🎯"><label class="il" for="i11">🎯</label>
          <input class="ir" type="radio" name="icon" id="i12" value="🌿"><label class="il" for="i12">🌿</label>
        </div>
      </div>

      <div class="fg">
        <label>Vibes</label>
        <div class="vrow">
          <input class="vc" type="checkbox" id="v1" value="Freiluft"><label class="vl" for="v1">Freiluft</label>
          <input class="vc" type="checkbox" id="v2" value="1 Tag"><label class="vl" for="v2">1 Tag</label>
          <input class="vc" type="checkbox" id="v3" value="2 Tage"><label class="vl" for="v3">2 Tage</label>
          <input class="vc" type="checkbox" id="v4" value="Ganzjährig"><label class="vl" for="v4">Ganzjährig</label>
          <input class="vc" type="checkbox" id="v5" value="Sommer"><label class="vl" for="v5">Sommer</label>
          <input class="vc" type="checkbox" id="v6" value="Frühling"><label class="vl" for="v6">Frühling</label>
          <input class="vc" type="checkbox" id="v7" value="Herbst"><label class="vl" for="v7">Herbst</label>
          <input class="vc" type="checkbox" id="v8" value="Adrenalin"><label class="vl" for="v8">Adrenalin</label>
          <input class="vc" type="checkbox" id="v9" value="Entspannt"><label class="vl" for="v9">Entspannt</label>
        </div>
      </div>

      <button class="submit" type="submit">Idee einreichen →</button>
    </form>
  </div>
</div>

<script>
const DEFAULTS = [
  { id:'d1', icon:'🌊', tag:'Natur & Meer', title:'Wattwanderung auf Sylt', loc:'Sylt, Schleswig-Holstein', body:'Mit einem lokalen Wattführer durch das Weltnaturerbe — barfuß durch Schlamm, Wind im Gesicht, kein Laptop in Sicht. Danach Austern und Weißwein in einem der Strandbistros. Sylt ist teuer, aber für 4 Leute mit einem guten 4-Sterne-Hotel vollkommen im Rahmen. Und der Kontrast zur Bürowoche ist maximal.', vibes:['Freiluft','Nordsee-Feeling','Frühling / Sommer'], wide:true },
  { id:'d2', icon:'🍷', tag:'Kulinarik', title:'Weingut-Tag in der Pfalz', loc:'Deutsche Weinstraße, Rheinland-Pfalz', body:'Ein gutes Weingut bucht für kleine Gruppen Privatführungen mit Kellermeister — Barrelverkostung, 5 Weine, Fragen stellen die man bei einer normalen Tour nie stellen kann. Danach Abendessen in Neustadt oder Deidesheim.', vibes:['1 Tag','Ganzjährig'], wide:false },
  { id:'d3', icon:'🏎', tag:'Adrenalin', title:'Racetrack Day am Nürburgring', loc:'Nürburg, Eifel', body:'Sportwagen mieten, mit Instructor über die Nordschleife. Jeder fährt, danach Rundenzeiten vergleichen. Für vier competitive Leute vermutlich die beste Entscheidung seit dem letzten Jahresgespräch.', vibes:['1 Tag','März – Nov'], wide:false },
  { id:'d4', icon:'🛶', tag:'Slow Travel', title:'Hausboot-Wochenende Mecklenburg', loc:'Mecklenburgische Seenplatte', body:'Ein Hausboot für 4 Personen, kein Führerschein nötig. Zwei Tage durch Seen und Kanäle schippern, grillen an Bord, abends irgendwo anlegen. Komplett loslassen, kein Hotel, kein Programm.', vibes:['2 Tage','Mai – Sep'], wide:false },
  { id:'d5', icon:'⛰', tag:'Outdoor', title:'Biken & Hütte im Allgäu', loc:'Allgäu / Kleinwalsertal', body:'E-Bikes oder klassisch — Tagesroute mit ordentlich Höhenmetern, Mittagsstopp auf einer Alm. Abends Übernachtung in einer gut ausgestatteten Berghütte mit Halbpension.', vibes:['1–2 Tage','Sommer / Herbst'], wide:false },
];

const load = k => { try { return JSON.parse(localStorage.getItem(k)) } catch { return null } };
const save = (k,v) => localStorage.setItem(k, JSON.stringify(v));

let trips   = load('t26-trips')   || DEFAULTS;
let likes   = load('t26-likes')   || {};
let myLikes = load('t26-my')      || [];

function render() {
  const g = document.getElementById('grid');
  g.innerHTML = '';
  trips.forEach((t, i) => {
    const n    = likes[t.id] || 0;
    const liked = myLikes.includes(t.id);
    const c = document.createElement('div');
    c.className = 'card';
    c.style.animationDelay = (.18 + i * .06) + 's';
    c.innerHTML = `
      <span class="card-emoji">${t.icon}</span>
      <span class="card-tag">${t.tag}</span>
      <div class="card-title">${t.title}</div>
      <div class="card-location">${t.loc}</div>
      <div class="card-body">${t.body}</div>
      <div class="card-pills">${(t.vibes||[]).map(v=>`<span class="pill">${v}</span>`).join('')}</div>
      <div class="card-foot">
        <button class="like-btn ${liked?'liked':''}" onclick="like('${t.id}',this)">
          <span class="h">${liked?'♥':'♡'}</span>
          <span>${n>0?n+' ':''}${liked?'Gefällt mir':'Gefällt mir'}</span>
        </button>
      </div>`;
    g.appendChild(c);
  });
  document.getElementById('nav-count').textContent = trips.length + ' Ideen';
}

function like(id, btn) {
  const h = btn.querySelector('.h');
  const isLiked = myLikes.includes(id);
  if (isLiked) {
    myLikes = myLikes.filter(x => x !== id);
    likes[id] = Math.max((likes[id]||1)-1, 0);
  } else {
    myLikes.push(id);
    likes[id] = (likes[id]||0)+1;
    h.classList.add('pop');
    setTimeout(()=>h.classList.remove('pop'), 300);
  }
  save('t26-likes', likes);
  save('t26-my', myLikes);
  render();
}

function openSheet()  { document.getElementById('backdrop').classList.add('open'); document.body.style.overflow='hidden'; }
function closeSheet() { document.getElementById('backdrop').classList.remove('open'); document.body.style.overflow=''; }
function onBackdrop(e) { if (e.target===document.getElementById('backdrop')) closeSheet(); }
document.addEventListener('keydown', e => { if(e.key==='Escape') closeSheet(); });

function onSubmit(e) {
  e.preventDefault();
  const t = {
    id: 'u'+Date.now(),
    icon: document.querySelector('.ir:checked')?.value || '✈️',
    tag:  document.getElementById('f-tag').value.trim(),
    title:document.getElementById('f-title').value.trim(),
    loc:  document.getElementById('f-loc').value.trim(),
    body: document.getElementById('f-body').value.trim(),
    vibes:[...document.querySelectorAll('.vc:checked')].map(x=>x.value),
    wide: false,
  };
  trips.push(t);
  save('t26-trips', trips);
  render();
  closeSheet();
  e.target.reset();
  setTimeout(()=>{
    document.querySelectorAll('.card')[trips.length-1]?.scrollIntoView({behavior:'smooth',block:'center'});
  }, 80);
}

render();
</script>
</body>
</html>
